<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>カート追加</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

  <div th:replace="~{header :: header}"></div>

  <div class="container">
    <h1>カート追加画面</h1>

    <div th:each="item : ${cartItems}">
      <p th:text="${item.product.productName}"></p>
      <p th:text="'個数：' + ${item.quantity}"></p>
      <p th:text="'カート内の合計：¥' + ${item.product.taxPrice * item.quantity}"></p>
    </div>

    <a class="btn" th:href="@{/cart}">カートに移動</a>
    <a class="btn" th:href="@{/top}">TOP画面に戻る</a>
  </div>

</body>
</html>
