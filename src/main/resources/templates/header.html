<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
</head>
<body>
	<div th:fragment="header">
		<header>
			<a th:href="@{/top}" style="color:white; text-decoration:none;">
				<span>Cytech EC.</span>
			</a>
			
			<!-- 検索フォーム -->
			<form th:action="@{/products/search}" method="get" style="display:inline;">
				<input type="text" name="keyword" placeholder="商品名">
				<select name="categoryId">
					<option value="">全カテゴリ</option>
					<!-- カテゴリ一覧をループして選択肢を表示 -->
					<option th:each="category : ${categories}"
					        th:value="${category.categoryId}"
							th:text="${category.categoryName}">
					</option>
				</select>
				<button type="submit">検索</button>
			</form>
			
			<!-- マイページ・ユーザー名・ログアウト -->
			<div style="display:flex; align-items:center; gap:10px;">
			  <a th:href="@{/mypage}">マイページ</a>
			  <div style="display:flex; flex-direction:column; font-size:13px;">
			    <span style="font-size:13px;">ユーザー名：<span th:text="${#authentication.name}"></span></span>
			    <form th:action="@{/logout}" method="post">
			      <button type="submit" style="background:none; border:none; color:white; cursor:pointer; padding:0; font-size:13px;">ログアウト</button>
			    </form>
			  </div>
			</div>
		</header>
	</div>
	
</body>
</html>
