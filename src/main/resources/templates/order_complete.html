<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>注文完了</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

  <div th:replace="~{header :: header}"></div>

  <div class="container">
    <h1>購入完了画面</h1>
    <h2 style="text-align: center; margin-bottom: 30px;">注文完了</h2>

    <!-- カートからの購入の場合 -->
    <div th:if="${cartItems != null and !cartItems.isEmpty()}">
      <div th:each="item : ${cartItems}" class="order-complete-item">
        <img th:src="${item.product.imgPath}" class="order-complete-img">
        <div>
          <p th:text="'商品名：' + ${item.product.productName}"></p>
          <p th:text="'数量：' + ${item.quantity}"></p>
          <p th:text="'税込価格：¥' + ${item.product.taxPrice * item.quantity}"></p>
          <p th:text="'住所：' + ${address}"></p>
        </div>
      </div>
      <p th:text="'合計金額：¥' + ${totalAmount}"></p>
    </div>

    <!-- 単品購入の場合 -->
    <div th:if="${product != null}" class="order-complete-item">
      <img th:src="${product.imgPath}" class="order-complete-img">
      <div>
        <p th:text="'商品名：' + ${product.productName}"></p>
        <p th:text="'数量：' + ${quantity}"></p>
        <p th:text="'税込価格：¥' + ${totalAmount}"></p>
        <p th:text="'住所：' + ${address}"></p>
      </div>
    </div>

    <div style="text-align: center; margin-top: 30px;">
      <a class="btn" th:href="@{/top}">TOP画面に戻る</a>
    </div>
  </div>

  <div th:replace="~{footer :: footer}"></div>

</body>
</html>
