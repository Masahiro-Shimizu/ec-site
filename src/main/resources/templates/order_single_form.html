<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>購入品詳細</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

  <div th:replace="~{header :: header}"></div>

  <div class="container" style="max-width: 600px;">
    <h1>購入詳細画面</h1>

    <form th:action="@{/order/single/confirm}" method="post">
      <input type="hidden" name="productId" th:value="${product.productId}">
      <input type="hidden" name="quantity" th:value="${quantity}">

      <!-- 受け取り場所 -->
      <h2>＜受け取り場所＞</h2>
      <div class="form-group">
        <label>名前：</label>
        <input type="text" name="recipientName">
      </div>
      <div class="form-group">
        <label>住所</label>
        <input type="text" name="address" placeholder="住所">
      </div>
      <div class="form-group">
        <label>アパート名等</label>
        <input type="text" name="apartmentName" placeholder="アパート名等">
      </div>

      <!-- お支払い情報 -->
      <h2>＜お支払い情報＞</h2>
      <div class="form-group">
        <div>
          <input type="radio" name="paymentMethod" value="クレジットカード1">
          <input type="text" name="cardNumber1" placeholder="カード番号">
          <input type="text" name="expiry1" placeholder="有効期限 DD/YY">
        </div>
        <div style="margin-top: 10px;">
          <input type="radio" name="paymentMethod" value="クレジットカード2">
          <input type="text" name="cardNumber2" placeholder="カード番号">
          <input type="text" name="expiry2" placeholder="有効期限 DD/YY">
        </div>
      </div>

      <button class="btn" type="submit">確認</button>
    </form>

    <a class="btn btn-red" th:href="@{/products/{id}(id=${product.productId})}">戻る</a>
  </div>

  <div th:replace="~{footer :: footer}"></div>

</body>
</html>
