<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>商品一覧</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

  <div th:replace="~{header :: header}"></div>

  <div class="container">
    <h1>商品一覧</h1>

    <div class="product-grid">
      <div class="product-card" th:each="product : ${products}">
        <a th:href="@{/products/{id}(id=${product.productId})}">
          <img th:src="${product.imgPath}" width="200" height="150">
        </a>
        <p th:text="${product.productName}"></p>
        <p th:text="${product.company.companyName}"></p>
        <p th:text="'¥' + ${product.price}"></p>
        <p th:text="'¥' + ${product.taxPrice} + '（税込）'"></p>
      </div>
    </div>

    <a class="btn" th:href="@{/top}">TOPに戻る</a>
  </div>

  <div th:replace="~{footer :: footer}"></div>

</body>
</html>
