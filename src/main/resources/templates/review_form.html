<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>口コミ投稿</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

  <div th:replace="~{header :: header}"></div>

  <div class="container">
    <h1>口コミ投稿画面</h1>

    <form th:action="@{/review}" method="post">
      <input type="hidden" name="productId" th:value="${productId}">

      <div class="form-group">
        <label>ユーザー名（任意）</label>
        <input type="text" name="dummyUserName" placeholder="ユーザー名">
      </div>
      <div class="form-group">
        <label>評価</label>
        <select name="rating">
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
        </select>
      </div>
      <div class="form-group">
        <label>コメント</label>
        <textarea name="comment" maxlength="300" placeholder="300文字以内で入力してください"></textarea>
      </div>
      <button class="btn" type="submit">投稿</button>
    </form>

    <a class="btn" th:href="@{/products/{id}(id=${productId})}">戻る</a>
  </div>

</body>
</html>
