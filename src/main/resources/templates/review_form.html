<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>口コミ投稿</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

  <div th:replace="~{header :: header}"></div>

  <div class="container" style="max-width: 600px;">
    <h1>口コミ投稿画面</h1>

    <form th:action="@{/review}" method="post" enctype="multipart/form-data">
      <input type="hidden" name="productId" th:value="${productId}">

      <div class="form-group">
        <label>ユーザー名（任意）</label>
        <input type="text" name="dummyUserName" placeholder="ユーザー名">
      </div>
      <div class="form-group">
        <label>評価</label>
        <select name="rating" style="width: auto;">
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
        </select>
      </div>
      <div class="form-group">
        <label>メールアドレス</label>
        <input type="email" name="email" placeholder="メールアドレス">
      </div>
      <div class="form-group">
        <label>コメント</label>
        <textarea name="comment" maxlength="300"
                  style="width: 100%; height: 100px;"></textarea>
      </div>
      <div class="form-group">
        <input type="file" name="imgFile" accept="image/*">
      </div>
      <div style="text-align: center;">
        <button class="btn" type="submit">投稿</button>
      </div>
    </form>
  </div>

  <div th:replace="~{footer :: footer}"></div>

</body>
</html>
